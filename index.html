<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Score Scroll</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;600&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0c;--surface:#13131a;--border:#222230;
  --accent:#e84545;--gold:#f4c842;--teal:#5bc8af;
  --lyric:#e8e8f0;--dim:#404055;--ui:rgba(10,10,12,0.96);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden}
body{background:var(--bg);color:var(--lyric);font-family:'Fira Code',monospace;display:flex;flex-direction:column}

/* TOPBAR */
#topbar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;z-index:10}
#menu-btn{background:none;border:1px solid var(--border);color:var(--gold);font-size:20px;width:40px;height:40px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation}
#song-title{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;letter-spacing:.08em;color:var(--gold);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;min-width:60px}
.btn{background:var(--border);border:none;color:var(--lyric);font-size:13px;padding:7px 12px;border-radius:6px;cursor:pointer;font-family:'Fira Code',monospace;user-select:none;-webkit-user-select:none;touch-action:manipulation;min-height:36px}
.btn:active{opacity:.7}
.btn-accent{background:var(--accent);color:#fff;font-weight:700;min-width:76px;font-size:14px}
.btn-gold{background:#3a2a00;color:var(--gold);font-weight:700;border:1px solid var(--gold)}
.btn-teal{background:#0a2a28;color:var(--teal);font-weight:700;border:1px solid var(--teal)}

/* 画像コントロールバー */
#img-bar{display:none;flex-shrink:0;padding:5px 10px;background:var(--surface);border-bottom:1px solid var(--border);align-items:center;gap:8px;flex-wrap:wrap}
#img-bar.on{display:flex}
#zoom-badge{font-size:12px;color:var(--gold);min-width:38px;text-align:center}
#invert-btn.on{background:var(--gold);color:#000}
#fit-btn.on{background:var(--teal);color:#000}

/* SCROLL */
#scroll-wrap{flex:1;min-height:0;overflow:hidden;position:relative}
#scroll-content{will-change:transform;transform:translateY(0)}
#scroll-content img{display:block;margin-bottom:2px;width:100%}

/* OVERLAY */
#overlay{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--ui) 45%);padding:18px 14px 14px;display:flex;justify-content:center;align-items:center;gap:10px;pointer-events:none;flex-wrap:wrap;z-index:20}
#overlay>*{pointer-events:all;touch-action:manipulation}
.ctrl-group{display:flex;align-items:center;gap:5px;flex-shrink:0}
.ctrl-label{font-size:10px;color:var(--lyric);opacity:.7;letter-spacing:.05em;text-transform:uppercase}
#speed-display{font-size:14px;font-weight:600;color:var(--gold);min-width:36px;text-align:center}

/* PANEL */
.panel{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column}
.panel.open{display:flex}
.panel-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.panel-title{font-family:'Oswald',sans-serif;font-size:15px;color:var(--gold);letter-spacing:.1em;flex:1}
.panel-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;display:flex;flex-direction:column;align-items:center;gap:12px}

/* SETLIST */
#setlist-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px;display:flex;flex-direction:column;gap:6px}
.setlist-item{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;gap:8px;cursor:pointer;touch-action:manipulation}
.setlist-item.active{border-color:var(--gold);background:#1c1a08}
.item-num{font-size:11px;color:var(--dim);min-width:20px}
.item-info{flex:1;overflow:hidden}
.item-title{font-size:14px;color:var(--lyric);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:10px;color:var(--dim);margin-top:2px}
.item-actions{display:flex;gap:4px}
.icon-btn{background:var(--border);border:none;color:var(--lyric);font-size:13px;padding:5px 8px;border-radius:4px;cursor:pointer;touch-action:manipulation}
.icon-btn.del{color:var(--accent)}
#setlist-footer{display:flex;gap:6px;padding:10px;flex-wrap:wrap;border-top:1px solid var(--border);flex-shrink:0}

/* ADD PANEL */
#add-panel .panel-body{align-items:center}
#thumb-wrap{display:none;width:100%;max-width:480px;flex-wrap:wrap;gap:6px}
#thumb-wrap.on{display:flex}
#drop-area{width:100%;max-width:480px;border:2px dashed var(--border);border-radius:10px;padding:32px 20px;text-align:center;color:var(--dim);font-size:13px;cursor:pointer;line-height:2;touch-action:manipulation}
#analyze-wrap{display:none;width:100%;max-width:480px;flex-direction:column;gap:8px}
#analyze-wrap.on{display:flex}
#score-count{color:var(--gold)}
input[type=file]{display:none}

/* EMPTY */
#empty-msg{display:none;padding:60px 20px;text-align:center;color:var(--dim);font-size:14px;line-height:2.5}
#empty-msg.on{display:block}

/* 手書きモード */
#draw-btn.on{background:var(--gold);color:#000;font-weight:700}
body.draw-mode #scroll-wrap{cursor:crosshair}
#draw-toolbar{display:none;position:fixed;bottom:130px;right:10px;z-index:400;flex-direction:column;gap:8px;pointer-events:all;align-items:center}
#draw-toolbar.on{display:flex}
.color-btn{width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer;touch-action:manipulation;flex-shrink:0}
.color-btn.active{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,0.6)}
@media(orientation:landscape){
  #topbar{flex-wrap:nowrap;padding:3px 10px;gap:5px}
  #song-title{font-size:13px}
  .btn{padding:5px 10px;font-size:12px;min-height:30px}
  .btn-accent{min-width:68px}
  #menu-btn{width:32px;height:32px;font-size:16px}
  #overlay{padding:6px 12px 8px;gap:8px}
  #scroll-content{padding-bottom:60px}
}
@media(orientation:portrait){
  #scroll-content{padding-bottom:100px}
}
</style>
</head>
<body>

<div id="topbar">
  <button id="menu-btn" onclick="openSetlist()">&#9776;</button>
  <div id="song-title" onclick="openSetlist()">読み込み中...</div>
  <button class="btn btn-gold" id="invert-btn" onclick="toggleInvert()">&#9680;</button>
  <button class="btn btn-teal" id="fit-btn" onclick="toggleFit()">&#8596;</button>
  <div class="ctrl-group">
    <span class="ctrl-label">ZOOM</span>
    <button class="btn" onclick="doZoom(-0.15)">－</button>
    <span id="zoom-badge">100%</span>
    <button class="btn" onclick="doZoom(+0.15)">＋</button>
  </div>
</div>

<div id="scroll-wrap">
  <div id="scroll-content">
    <div id="empty-msg" class="on">&#9776; をタップして<br>楽譜を追加してください</div>
  </div>
  <canvas id="draw-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;touch-action:none"></canvas>
</div>

<div id="overlay">
  <button class="btn" onclick="prevSong()">&#9198;</button>
  <div class="ctrl-group">
    <span class="ctrl-label">SPEED</span>
    <button class="btn" onclick="changeSpeed(-5)">－</button>
    <span id="speed-display">&#8212;</span>
    <button class="btn" onclick="changeSpeed(+5)">＋</button>
  </div>
  <button class="btn btn-accent" id="play-btn" onclick="toggleScroll()">&#9654; START</button>
  <button class="btn" onclick="nextSong()">&#9197;</button>
  <button class="btn" onclick="jumpToTop()" title="先頭へ">&#11014;</button>
  <button class="btn" id="draw-btn" onclick="toggleDrawMode()" title="手書きマーカー">&#9998;</button>
</div>

<!-- 手書きツールバー -->
<div id="draw-toolbar">
  <button class="color-btn active" style="background:#f4c842" onclick="setDrawColor('#f4c842',this)"></button>
  <button class="color-btn" style="background:#e84545" onclick="setDrawColor('#e84545',this)"></button>
  <button class="color-btn" style="background:#5bc8af" onclick="setDrawColor('#5bc8af',this)"></button>
  <button class="color-btn" style="background:#fff" onclick="setDrawColor('#fff',this)"></button>
  <button id="eraser-btn" onclick="setEraser(this)" style="width:36px;height:36px;border-radius:50%;background:#444;border:3px solid transparent;cursor:pointer;touch-action:manipulation;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center">&#10006;</button>
  <button id="draw-clear-btn" onclick="clearDrawing()" style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 8px;font-size:11px;cursor:pointer;touch-action:manipulation;font-family:'Fira Code',monospace">&#x5168;&#x6D88;&#x53BB;</button>
</div>

<!-- SETLIST -->
<div id="setlist-panel" class="panel">
  <div class="panel-header">
    <span class="panel-title">&#127925; セットリスト</span>
    <button class="btn" onclick="closeSetlist()">&#10005; 閉じる</button>
  </div>
  <div id="setlist-list"></div>
  <div id="setlist-footer">
    <button class="btn btn-accent" style="flex:1" onclick="openAddPanel()">&#43; 楽譜を追加</button>
  </div>
</div>

<!-- ADD -->
<div id="add-panel" class="panel">
  <div class="panel-header">
    <span class="panel-title">&#128247; 楽譜を追加</span>
    <button class="btn" onclick="closeAddPanel()">&#10005; 閉じる</button>
  </div>
  <div class="panel-body">
    <div style="display:flex;gap:8px;width:100%;max-width:480px;flex-wrap:wrap">
      <button class="btn btn-accent" style="flex:1;padding:12px" onclick="document.getElementById('cam-input').click()">&#128247; カメラ撮影</button>
      <button class="btn" style="flex:1;padding:12px" onclick="document.getElementById('file-input').click()">&#128444; 画像選択（複数可）</button>
      <button class="btn btn-teal" style="flex:1;padding:12px" onclick="document.getElementById('pdf-input').click()">&#128196; PDF</button>
    </div>
    <input type="file" id="cam-input" accept="image/*" capture="environment" onchange="handleFiles(this)">
    <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this)">
    <input type="file" id="pdf-input" accept="image/*,application/pdf" multiple onchange="handleFiles(this)">

    <div id="thumb-wrap"></div>

    <div id="drop-area" onclick="document.getElementById('file-input').click()">
      ここをタップして画像を選択<br>
      <small style="opacity:.5">複数枚・PDFページ対応</small>
    </div>

    <div id="analyze-wrap">
      <button class="btn btn-accent" onclick="addSong()" style="width:100%;padding:12px;font-size:14px">
        &#43; セットリストに追加（<span id="score-count">0</span>枚）
      </button>
      <button class="btn" onclick="clearFiles()" style="width:100%;padding:10px">&#10005; クリア</button>
    </div>
  </div>
</div>

<script>
// ==== STATE ====
var setlist=[], currentIndex=0, scrollY=0, scrollSpeed=0, currentSpeedTarget=40;
var rafId=null, lastTs=null, songStartTime=0, scrollPausedAt=0;
var imgScale=1.0, imgInverted=false, imgFit=true;
var scanFiles=[];

// ==== INDEXEDDB ====
var idb=null;
function openDB(cb){
  if(idb){cb(idb);return;}
  var r=indexedDB.open('score-scroll',1);
  r.onupgradeneeded=function(e){e.target.result.createObjectStore('images');};
  r.onsuccess=function(e){idb=e.target.result;cb(idb);};
  r.onerror=function(){cb(null);};
}
function saveImages(key,imgs,cb){
  openDB(function(db){
    if(!db){cb&&cb();return;}
    var tx=db.transaction('images','readwrite');
    tx.objectStore('images').put(imgs,key);
    tx.oncomplete=function(){cb&&cb();};
  });
}
function loadImages(key,cb){
  openDB(function(db){
    if(!db){cb([]);return;}
    var tx=db.transaction('images','readonly');
    var r=tx.objectStore('images').get(key);
    r.onsuccess=function(){cb(r.result||[]);};
    r.onerror=function(){cb([]);};
  });
}
function deleteImages(key){
  openDB(function(db){
    if(!db)return;
    var tx=db.transaction('images','readwrite');
    tx.objectStore('images').delete(key);
  });
}

// ==== PERSIST ====
function saveState(){
  try{
    var s=setlist.map(function(s){return {title:s.title,imageKey:s.imageKey,speedTarget:s.speedTarget,memo:s.memo||''};});
    localStorage.setItem('ss_list',JSON.stringify(s));
    localStorage.setItem('ss_idx',currentIndex);
  }catch(e){}
}
function loadState(){
  try{
    var d=localStorage.getItem('ss_list');
    if(d) setlist=JSON.parse(d);
    var i=localStorage.getItem('ss_idx');
    if(i!==null) currentIndex=parseInt(i)||0;
  }catch(e){}
  currentIndex=Math.min(currentIndex,Math.max(0,setlist.length-1));
}

// ==== RENDER ====
function render(){
  var empty=document.getElementById('empty-msg');
  if(!setlist.length){
    document.getElementById('song-title').textContent='\u697d\u8b5c\u304c\u3042\u308a\u307e\u305b\u3093';
    document.getElementById('scroll-content').innerHTML='<div id="empty-msg" class="on" style="padding:60px 20px;text-align:center;color:var(--dim);font-size:14px;line-height:2.5">&#9776; \u3092\u30bf\u30c3\u30d7\u3057\u3066<br>\u697d\u8b5c\u3092\u8ffd\u52a0\u3057\u3066\u304f\u3060\u3055\u3044</div>';
    return;
  }
  var song=setlist[currentIndex];
  document.getElementById('song-title').textContent=song.title||'\u697d\u8b5c';
  currentSpeedTarget=song.speedTarget||40;
  // ズーム・反転設定を復元
  imgScale=song.imgScale||1.0;
  imgFit=(song.imgFit!==undefined)?song.imgFit:true;
  imgInverted=song.imgInverted||false;
  document.getElementById('speed-display').textContent='\u2014';
  document.getElementById('scroll-content').innerHTML='<div style="padding:30px;text-align:center;color:var(--dim);font-size:13px">\u8aad\u307f\u8fbc\u307f\u4e2d...</div>';
  loadImages(song.imageKey,function(imgs){
    var c=document.getElementById('scroll-content');
    c.innerHTML='';
    if(!imgs||!imgs.length){
      c.innerHTML='<div style="padding:30px;text-align:center;color:var(--accent)">\u753b\u50cf\u304c\u898b\u3064\u304b\u308a\u307e\u305b\u3093</div>';
      return;
    }
    imgs.forEach(function(src){
      var img=document.createElement('img');
      img.src=src;
      img.style.cssText='display:block;margin-bottom:2px';
      c.appendChild(img);
    });
    applyImgSettings();
    resetScroll();
  });
  saveState();
}

// ==== IMAGE SETTINGS ====
function applyImgSettings(){
  // ズーム
  var imgs=document.querySelectorAll('#scroll-content img');
  imgs.forEach(function(img){
    img.style.width=(imgFit?'100%':Math.round(imgScale*100)+'%');
  });
  document.getElementById('zoom-badge').textContent=imgFit?'FIT':Math.round(imgScale*100)+'%';
  // 反転
  document.getElementById('scroll-content').style.filter=imgInverted?'invert(1) hue-rotate(180deg)':'';
  var ib=document.getElementById('invert-btn');
  ib.style.background=imgInverted?'var(--gold)':'';
  ib.style.color=imgInverted?'#000':'';
  var fb=document.getElementById('fit-btn');
  fb.style.background=imgFit?'var(--teal)':'';
  fb.style.color=imgFit?'#000':'';
}
function doZoom(delta){
  imgFit=false;
  imgScale=Math.max(0.3,Math.min(3.0,Math.round((imgScale+delta)*10)/10));
  applyImgSettings();
  saveImgSettings();
}
function toggleInvert(){imgInverted=!imgInverted;applyImgSettings();saveImgSettings();}
function toggleFit(){
  imgFit=!imgFit;
  if(imgFit) imgScale=1.0;
  applyImgSettings();
  saveImgSettings();
}
function saveImgSettings(){
  if(setlist[currentIndex]){
    setlist[currentIndex].imgScale=imgScale;
    setlist[currentIndex].imgFit=imgFit;
    setlist[currentIndex].imgInverted=imgInverted;
    saveState();
  }
}

// ==== SCROLL ====
function resetScroll(){
  scrollY=0;scrollPausedAt=0;songStartTime=Date.now();
  applyScroll();stopScroll();
  // 描画は維持（曲ごとに保存済み）
  var canvas=document.getElementById('draw-canvas');
  if(canvas) redrawCanvas();
}
function applyScroll(){
  var c=document.getElementById('scroll-content'),w=document.getElementById('scroll-wrap');
  var max=Math.max(0,c.scrollHeight-w.clientHeight);
  scrollY=Math.max(0,Math.min(scrollY,max));
  c.style.transform='translateY('+(-scrollY)+'px)';
  if(drawHistory.length>0) redrawCanvas();
}
function stopScroll(){
  scrollPausedAt=(Date.now()-songStartTime)/1000;
  scrollSpeed=0;
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  lastTs=null;
  document.getElementById('play-btn').textContent='\u25b6 START';
  document.getElementById('speed-display').textContent='\u2014';
}
function toggleScroll(){
  if(scrollSpeed>0||rafId){stopScroll();return;}
  songStartTime=Date.now()-scrollPausedAt*1000;
  scrollSpeed=currentSpeedTarget;
  document.getElementById('play-btn').textContent='\u23f8 STOP';
  document.getElementById('speed-display').textContent=String(currentSpeedTarget);
  lastTs=null;rafId=requestAnimationFrame(scrollFrame);
}
function scrollFrame(ts){
  if(!lastTs)lastTs=ts;
  var dt=(ts-lastTs)/1000;lastTs=ts;
  scrollY+=scrollSpeed*dt;
  applyScroll();
  var c=document.getElementById('scroll-content'),w=document.getElementById('scroll-wrap');
  if(scrollY>=c.scrollHeight-w.clientHeight){stopScroll();return;}
  rafId=requestAnimationFrame(scrollFrame);
}
function changeSpeed(d){
  currentSpeedTarget=Math.max(5,Math.min(300,currentSpeedTarget+d));
  if(scrollSpeed>0){scrollSpeed=currentSpeedTarget;document.getElementById('speed-display').textContent=String(currentSpeedTarget);}
  if(setlist[currentIndex]){setlist[currentIndex].speedTarget=currentSpeedTarget;saveState();}
}
function goToSong(i){
  if(i<0||i>=setlist.length)return;
  // 現在の描画・速度・ズーム設定を保存
  drawHistoryMap[currentIndex]=drawHistory.slice();
  if(setlist[currentIndex]){
    setlist[currentIndex].speedTarget=currentSpeedTarget;
    setlist[currentIndex].imgScale=imgScale;
    setlist[currentIndex].imgFit=imgFit;
    setlist[currentIndex].imgInverted=imgInverted;
  }
  saveState();
  currentIndex=i;
  // 次の曲の描画を復元
  drawHistory=drawHistoryMap[currentIndex]?drawHistoryMap[currentIndex].slice():[];
  currentLines=[];
  render();
}
function nextSong(){goToSong((currentIndex+1)%setlist.length);}
function prevSong(){goToSong((currentIndex-1+setlist.length)%setlist.length);}

// ==== TOUCH ====
var tsy=0,tscy=0;
document.getElementById('scroll-wrap').addEventListener('touchstart',function(e){
  tsy=e.touches[0].clientY;tscy=scrollY;
  if(scrollSpeed>0) stopScroll();
},{passive:true});
document.getElementById('scroll-wrap').addEventListener('touchmove',function(e){
  scrollY=tscy+(tsy-e.touches[0].clientY);
  applyScroll();
},{passive:true});
document.getElementById('scroll-wrap').addEventListener('touchend',function(e){
  tscy=scrollY;
},{passive:true});

// ==== SETLIST PANEL ====
function openSetlist(){stopScroll();renderSetlist();document.getElementById('setlist-panel').classList.add('open');}
function closeSetlist(){document.getElementById('setlist-panel').classList.remove('open');}
function renderSetlist(){
  var list=document.getElementById('setlist-list');
  list.innerHTML='';
  if(!setlist.length){list.innerHTML='<div style="padding:30px;text-align:center;color:var(--dim)">\u697d\u8b5c\u304c\u3042\u308a\u307e\u305b\u3093</div>';return;}
  setlist.forEach(function(song,i){
    var item=document.createElement('div');item.className='setlist-item'+(i===currentIndex?' active':'');
    var num=document.createElement('div');num.className='item-num';num.textContent=i+1;
    var info=document.createElement('div');info.className='item-info';
    var t=document.createElement('div');t.className='item-title';t.textContent=song.title||'\u697d\u8b5c';
    var m=document.createElement('div');m.className='item-meta';m.textContent='SPEED: '+(song.speedTarget||40);
    info.appendChild(t);info.appendChild(m);
    var actions=document.createElement('div');actions.className='item-actions';
    function mkBtn(label,cls,cb){var b=document.createElement('button');b.className='icon-btn'+(cls?' '+cls:'');b.textContent=label;b.addEventListener('click',function(e){e.stopPropagation();cb();});return b;}
    actions.appendChild(mkBtn('\u270f\ufe0f','',function(){renameSong(i);}));
    actions.appendChild(mkBtn('\u2191','',function(){moveSong(i,-1);}));
    actions.appendChild(mkBtn('\u2193','',function(){moveSong(i,+1);}));
    actions.appendChild(mkBtn('\ud83d\uddd1','del',function(){deleteSong(i);}));
    item.appendChild(num);item.appendChild(info);item.appendChild(actions);
    item.addEventListener('click',function(){goToSong(i);closeSetlist();});
    list.appendChild(item);
  });
}
function renameSong(i){
  var current=setlist[i].title||'\u697d\u8b5c';
  var newTitle=prompt('\u66f2\u540d\u3092\u5909\u66f4\u3057\u3066\u304f\u3060\u3055\u3044',current);
  if(newTitle===null)return;
  if(!newTitle.trim())return;
  setlist[i].title=newTitle.trim();
  saveState();
  renderSetlist();
  if(i===currentIndex) document.getElementById('song-title').textContent=newTitle.trim();
}
function moveSong(i,dir){
  var j=i+dir;if(j<0||j>=setlist.length)return;
  var tmp=setlist[i];setlist[i]=setlist[j];setlist[j]=tmp;
  if(currentIndex===i)currentIndex=j;else if(currentIndex===j)currentIndex=i;
  renderSetlist();saveState();
}
function deleteSong(i){
  if(!confirm('\u300c'+setlist[i].title+'\u300d\u3092\u524a\u9664\u3057\u307e\u3059\u304b\uff1f'))return;
  deleteImages(setlist[i].imageKey);
  setlist.splice(i,1);
  if(currentIndex>=setlist.length)currentIndex=Math.max(0,setlist.length-1);
  renderSetlist();render();
}

// ==== ADD PANEL ====
function openAddPanel(){clearFiles();document.getElementById('add-panel').classList.add('open');}
function closeAddPanel(){document.getElementById('add-panel').classList.remove('open');}
function handleFiles(input){
  var files=Array.prototype.slice.call(input.files);
  if(!files.length)return;input.value='';
  var pending=files.length;
  files.forEach(function(file){
    var reader=new FileReader();
    reader.onload=function(e){
      scanFiles.push({dataUrl:e.target.result,name:file.name});
      pending--;
      if(pending===0) renderThumbs();
    };
    reader.readAsDataURL(file);
  });
}
function renderThumbs(){
  var wrap=document.getElementById('thumb-wrap');
  wrap.innerHTML='';wrap.classList.add('on');
  document.getElementById('drop-area').style.display='none';
  scanFiles.forEach(function(f,i){
    var w=document.createElement('div');w.style.cssText='position:relative;width:90px;height:90px;flex-shrink:0';
    var img=document.createElement('img');
    img.src=f.dataUrl;
    img.style.cssText='width:90px;height:90px;object-fit:cover;border-radius:6px;border:1px solid var(--border)';
    var del=document.createElement('button');
    del.textContent='\u2715';del.style.cssText='position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.7);border:none;color:#fff;font-size:11px;width:20px;height:20px;border-radius:50%;cursor:pointer;padding:0';
    var num=document.createElement('div');
    num.style.cssText='position:absolute;bottom:2px;left:4px;background:rgba(0,0,0,0.6);color:#fff;font-size:10px;padding:1px 4px;border-radius:3px';
    num.textContent=i+1;
    (function(idx){del.addEventListener('click',function(){scanFiles.splice(idx,1);renderThumbs();});})(i);
    w.appendChild(img);w.appendChild(del);w.appendChild(num);wrap.appendChild(w);
  });
  // ＋ボタン
  var add=document.createElement('button');
  add.style.cssText='width:90px;height:90px;background:var(--surface);border:2px dashed var(--border);border-radius:6px;color:var(--dim);font-size:24px;cursor:pointer;flex-shrink:0';
  add.textContent='+';add.addEventListener('click',function(){document.getElementById('file-input').click();});
  wrap.appendChild(add);
  document.getElementById('score-count').textContent=scanFiles.length;
  document.getElementById('analyze-wrap').classList.add('on');
}
function clearFiles(){
  scanFiles=[];
  document.getElementById('thumb-wrap').innerHTML='';
  document.getElementById('thumb-wrap').classList.remove('on');
  document.getElementById('drop-area').style.display='block';
  document.getElementById('analyze-wrap').classList.remove('on');
}
function addSong(){
  if(!scanFiles.length)return;
  var title=prompt('\u66f2\u540d\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044','');
  if(title===null)return;
  if(!title.trim())title='\u697d\u8b5c '+(setlist.length+1);
  var imageKey='img_'+Date.now();
  var imgs=scanFiles.map(function(f){return f.dataUrl;});
  saveImages(imageKey,imgs,function(){
    setlist.push({title:title,imageKey:imageKey,speedTarget:40,memo:''});
    currentIndex=setlist.length-1;
    closeAddPanel();closeSetlist();clearFiles();render();
  });
}

// ==== JUMP TO TOP ====
function jumpToTop(){
  scrollY=0;scrollPausedAt=0;songStartTime=Date.now();
  applyScroll();
  if(scrollSpeed>0) stopScroll();
}

// ==== DRAW MODE ====
var drawMode=false, drawColor='#f4c842', drawSize=4, isEraser=false;
var drawHistoryMap={}; // {songIndex: drawHistory}
var drawHistory=[]; // 現在の曲の描画データ
var currentLines=[];
var drawActive=false;

function toggleDrawMode(){
  drawMode=!drawMode;
  var btn=document.getElementById('draw-btn');
  var toolbar=document.getElementById('draw-toolbar');
  var canvas=document.getElementById('draw-canvas');
  btn.classList.toggle('on',drawMode);
  toolbar.classList.toggle('on',drawMode);
  document.body.classList.toggle('draw-mode',drawMode);
  // ドローモード時: キャンバスはz-index:15（overlayの下、scroll-contentの上）
  canvas.style.pointerEvents=drawMode?'all':'none';
  canvas.style.zIndex=drawMode?'15':'5';
  if(drawMode) resizeCanvas();
}

function setDrawColor(color, btn){
  isEraser=false;
  drawColor=color;
  document.querySelectorAll('.color-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('eraser-btn').style.borderColor='transparent';
  btn.classList.add('active');
}
function setEraser(btn){
  isEraser=true;
  document.querySelectorAll('.color-btn').forEach(function(b){b.classList.remove('active');});
  btn.style.borderColor='#fff';
}

function resizeCanvas(){
  var canvas=document.getElementById('draw-canvas');
  var wrap=document.getElementById('scroll-wrap');
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;
  redrawCanvas();
}

function redrawCanvas(){
  var canvas=document.getElementById('draw-canvas');
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // scrollYに応じてオフセットして描画
  drawHistory.forEach(function(entry){
    entry.lines.forEach(function(line){
      if(line.points.length<2) return;
      ctx.save();
      ctx.translate(0, -(scrollY - entry.scrollY));
      ctx.beginPath();
      ctx.strokeStyle=line.color;
      ctx.lineWidth=line.size;
      ctx.lineCap='round';
      ctx.lineJoin='round';
      if(line.eraser) ctx.globalCompositeOperation='destination-out';
      ctx.moveTo(line.points[0].x, line.points[0].y);
      for(var i=1;i<line.points.length;i++) ctx.lineTo(line.points[i].x, line.points[i].y);
      ctx.stroke();
      ctx.restore();
    });
  });
}

function clearDrawing(){
  if(!confirm('\u3053\u306e\u66f2\u306e\u624b\u66f8\u304d\u3092\u5168\u3066\u6d88\u3057\u307e\u3059\u304b\uff1f'))return;
  drawHistory=[];currentLines=[];
  drawHistoryMap[currentIndex]=[];
  var canvas=document.getElementById('draw-canvas');
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

// キャンバスのタッチイベント
document.addEventListener('DOMContentLoaded',function(){
  var canvas=document.getElementById('draw-canvas');

  canvas.addEventListener('touchstart',function(e){
    if(!drawMode)return;
    e.preventDefault();
    var t=e.touches[0];
    var r=canvas.getBoundingClientRect();
    drawActive=true;
    var line={color:drawColor,size:isEraser?20:drawSize,eraser:isEraser,points:[{x:t.clientX-r.left,y:t.clientY-r.top}]};
    currentLines.push(line);
    // 今のscrollYでエントリーを作成または追加
    var entry=drawHistory.length>0?drawHistory[drawHistory.length-1]:null;
    if(!entry||entry.scrollY!==scrollY){
      entry={scrollY:scrollY,lines:[]};
      drawHistory.push(entry);
    }
    entry.lines.push(line);
  },{passive:false});

  canvas.addEventListener('touchmove',function(e){
    if(!drawMode||!drawActive)return;
    e.preventDefault();
    var t=e.touches[0];
    var r=canvas.getBoundingClientRect();
    var line=currentLines[currentLines.length-1];
    if(!line)return;
    line.points.push({x:t.clientX-r.left,y:t.clientY-r.top});
    redrawCanvas();
  },{passive:false});

  canvas.addEventListener('touchend',function(e){
    drawActive=false;
  },{passive:true});

  window.addEventListener('resize',function(){if(drawMode)resizeCanvas();});
});
window.onerror=function(msg,src,line){
  var d=document.createElement('div');
  d.style.cssText='position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;font-size:12px;padding:8px;z-index:9999';
  d.textContent='Error: '+msg+' (line '+line+')';
  document.body.appendChild(d);
};
loadState();
render();
</script>
